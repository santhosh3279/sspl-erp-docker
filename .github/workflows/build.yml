name: Build & Push SSPL ERPNext Image
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'
      no_cache:
        description: 'Force rebuild without cache'
        required: false
        type: boolean
        default: false
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
      - name: Checkout frappe_docker
        uses: actions/checkout@v4
        with:
          repository: frappe/frappe_docker
          ref: main
          path: frappe_docker
      - name: Patch Containerfile to build frontend assets + install fonts
        run: |
          python3 -c "
          with open('frappe_docker/images/custom/Containerfile', 'r') as f:
              content = f.read()
          
          # Add font installation after FROM statement
          content = content.replace(
              'FROM frappe/erpnext',
              '''FROM frappe/erpnext
          
          # Install fonts for wkhtmltopdf PDF rendering
          RUN apt-get update && apt-get install -y --no-install-recommends \\\\
              fonts-liberation \\\\
              fonts-noto \\\\
              fonts-dejavu-core \\\\
              && fc-cache -f -v \\\\
              && rm -rf /var/lib/apt/lists/*'''
          )
          
          # Add bench build before the .git cleanup
          # Find the line with 'find apps -mindepth 1 -path' and add bench build before it
          content = content.replace(
              'find apps -mindepth 1 -path \"*/.git\" | xargs rm -fr',
              '''cd /home/frappe/frappe-bench && \\\\
            bench build --apps erpnext --production && \\\\
            find apps -mindepth 1 -path \"*/.git\" | xargs rm -fr'''
          )
          
          with open('frappe_docker/images/custom/Containerfile', 'w') as f:
              f.write(content)
          "
          
          # Verify the apps.json includes ERPNext
          echo "Verifying apps.json..."
          cat apps.json
          
      - name: Prepare apps.json
        run: |
          echo "APPS_JSON_BASE64=$(base64 -w 0 apps.json)" >> $GITHUB_ENV
          echo "APPS_JSON_HASH=$(sha256sum apps.json | cut -d' ' -f1)" >> $GITHUB_ENV
          echo "Apps JSON Hash: $(sha256sum apps.json | cut -d' ' -f1)"
          echo "Apps being installed:"
          cat apps.json
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: frappe_docker
          file: frappe_docker/images/custom/Containerfile
          push: true
          no-cache: ${{ github.event.inputs.no_cache == 'true' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/sspl-erpnext:${{ github.event.inputs.version }}
            ghcr.io/${{ github.repository_owner }}/sspl-erpnext:latest
          build-args: |
            APPS_JSON_BASE64=${{ env.APPS_JSON_BASE64 }}
            FRAPPE_BRANCH=version-16
            APPS_JSON_HASH=${{ env.APPS_JSON_HASH }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Delete old image versions (keep last 3)
        uses: actions/delete-package-versions@v5
        with:
          package-name: sspl-erpnext
          package-type: container
          min-versions-to-keep: 3
